# =============================================================================
# Youtube Bot - Docker Compose Configuration
# =============================================================================

services:
  mysql:
    networks:
      - youtube-bot-network
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=youtube_premium_billing_bot
      - MYSQL_ROOT_PASSWORD=1234567
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p1234567"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  youtube-bot:
    networks:
      - youtube-bot-network
    image: rodrigo/youtube-bot:v1-ubuntu
    container_name: youtube-bot
    ports:
      - "8080:8080"
    environment:
      # Server config
      - NODE_ENV=production
      - YOUTUBE_EMAIL_USERNAME
      - YOUTUBE_EMAIL_PASSWORD
      - DB_URL=jdbc:mysql://mysql:3306/youtube_premium_billing_bot?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - DB_USERNAME=root
      - DB_PASSWORD=1234567
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:

networks:
    youtube-bot-network:
        name: youtube-bot-network