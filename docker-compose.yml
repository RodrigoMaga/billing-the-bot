# =============================================================================
# Youtube Bot - Docker Compose Configuration
# =============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: youtube_premium_billing_bot
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD obrigatoria}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    networks:
      - youtube-bot-network

  youtube-bot:
    networks:
      - youtube-bot-network
    image: rodrigo/youtube-bot:v1-ubuntu
    container_name: youtube-bot
    ports:
      - "8080:8080"
    environment:
      # Server config
      - YOUTUBE_EMAIL_USERNAME=${YOUTUBE_EMAIL_USERNAME}
      - YOUTUBE_EMAIL_PASSWORD=${YOUTUBE_EMAIL_PASSWORD}
      - DB_URL=jdbc:mysql://mysql:3306/youtube_premium_billing_bot?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  youtube-bot-network:
    name: youtube-bot-network